services:
  db:
    image: postgres:17-alpine
    container_name: aluminium_shop_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aluminium_shop_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aluminium_shop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aluminium_shop_web
    environment:
      DATABASE_URL: ecto://postgres:postgres@db:5432/aluminium_shop_dev
      SECRET_KEY_BASE: dev_secret_key_base_for_development_only
      PHX_HOST: localhost
      MIX_ENV: dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
    networks:
      - aluminium_shop_network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        mix deps.get &&
        mix ecto.create &&
        mix ecto.migrate &&
        mix phx.server
      "
    stdin_open: true
    tty: true

networks:
  aluminium_shop_network:
    driver: bridge

volumes:
  postgres_data:
  mix_deps:
  mix_build: