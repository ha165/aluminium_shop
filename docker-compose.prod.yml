# docker-compose.prod.yml
services:
  db:
    image: postgres:17-alpine
    container_name: aluminium_shop_db_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - aluminium_shop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aluminium_shop_web_prod
    environment:
      DATABASE_URL: ecto://${DB_USER}:${DB_PASSWORD}@db/${DB_NAME}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST}
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - aluminium_shop_network
    depends_on:
      db:
        condition: service_healthy
    restart: always

networks:
  aluminium_shop_network:
    driver: bridge

volumes:
  postgres_data_prod: